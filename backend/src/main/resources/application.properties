# =============================================
# Fleet Management System — Spring Boot Config
# =============================================

# Server port
server.port=${PORT:8080}

# ── MySQL Database Connection ──
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fleet_management_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:Krish#244}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate Settings ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Disable Open-in-View (best practice) ──
spring.jpa.open-in-view=false
